<!doctype html>
<html lang="es">
  <head>
    <title>Admin Panel</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  
  <style>
    body {
      background-image: url(img/Admin.png);
       background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        position: relative;
        margin: 0;
        padding: 0;
      }
      
      /* Capa oscura semitransparente para que el texto se lea bien */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6); /* Ajusta la opacidad aquí */
        z-index: 0;
      }
      
        /* El contenido va encima de la capa oscura */
        .container {
          position: relative;
          color: white;
          top: 10px;
        }
    
  </style>
</head>
  <body>
    
    <div class="container" style="margin-top: 0px;"> 
      <h2 class="mb-4">Panel Administrador</h2>

      <button onclick="logout()" class="btn btn-danger mb-4">Logout</button>

      <!-- CREAR MATERIA -->

      <div class="card bg-secondary mb-4">
        <div class="card-body">
          <h4>Crear Materia</h4>

          <div class="row">
            <div class="col-md-6">
              <input
                id="subject"
                class="form-control"
                placeholder="Nombre materia"
              />
            </div>

            <div class="col-md-3">
              <button onclick="createSubject()" class="btn btn-primary w-100">
                Crear
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- LISTA DE MATERIAS -->

      <div class="card bg-secondary mb-4">
        <div class="card-body">
          <h4>Materias</h4>

          <table class="table table-dark table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
              </tr>
            </thead>

            <tbody id="subjectsTable"></tbody>
          </table>
        </div>
      </div>

      <!-- ASIGNAR NOTA -->

      <div class="card bg-secondary mb-4">
        <div class="card-body">
          <h4>Asignar Nota</h4>

          <select id="student_id" class="form-control mb-2"></select>

          <select id="subject_id" class="form-control mb-2"></select>

          <input id="grade" class="form-control mb-2" placeholder="Nota" />

          <button onclick="assignGrade()" class="btn btn-success">
            Asignar Nota
          </button>
        </div>
      </div>

      <!-- TABLA DE NOTAS -->

      <div class="card bg-secondary">
        <div class="card-body">
          <h4>Notas Registradas</h4>

          <table class="table table-dark table-striped">
            <thead>
              <tr>
                <th>Estudiante</th>
                <th>Materia</th>
                <th>Nota</th>
              </tr>
            </thead>

            <tbody id="gradesTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>

    <script>
      async function loadSubjects() {
        const res = await fetch(API + "/subjects", {
          headers: getHeaders(),
        });

        const data = await res.json();

        subjectsTable.innerHTML = "";
        subject_id.innerHTML = "";

        data.forEach((s) => {
          subjectsTable.innerHTML += `
<tr>
<td>${s.id}</td>
<td>${s.name}</td>
</tr>
`;

          subject_id.innerHTML += `
<option value="${s.id}">
${s.name}
</option>
`;
        });
      }

      async function loadStudents() {
        const res = await fetch(API + "/users/students", {
          headers: getHeaders(),
        });

        const data = await res.json();

        student_id.innerHTML = "";

        data.forEach((s) => {
          student_id.innerHTML += `
<option value="${s.id}">
${s.name} (${s.email})
</option>
`;
        });
      }

      async function loadGrades() {
        const res = await fetch(API + "/grades", {
          headers: getHeaders(),
        });

        const data = await res.json();

        gradesTable.innerHTML = "";

        data.forEach((g) => {
          gradesTable.innerHTML += `
<tr>
<td>${g.student}</td>
<td>${g.subject}</td>
<td>${g.grade}</td>
</tr>
`;
        });
      }

      async function createSubject() {
        await fetch(API + "/subjects", {
          method: "POST",

          headers: getHeaders(),

          body: JSON.stringify({
            name: subject.value,
          }),
        });

        subject.value = "";

        loadSubjects();
      }

      async function assignGrade() {
        await fetch(API + "/grades/assign", {
          method: "POST",

          headers: getHeaders(),

          body: JSON.stringify({
            student_id: student_id.value,
            subject_id: subject_id.value,
            grade: grade.value,
          }),
        });

        grade.value = "";

        loadGrades();
      }
      (function() {
promise.all([
      loadSubjects(),
      loadStudents(),
      loadGrades(),
    ]).catch(error => console.error('Error cargando datos:', error));
      }) ();
    </script>
  </body>
</html>
