<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>Registro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
                rgba(0, 0, 0, 0.5),
                rgba(0, 0, 0, 0.3)
            ), url(img/Portada.png);
        font-family: Arial, Helvetica, sans-serif;
      }

      .register-card {
        width: 420px;
        background:rgb(169, 169, 169);
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        color: black;
      }

      .title {
        text-align: center;
        font-weight: bold;
        margin-bottom: 25px;
      }

      .logo {
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #0d6efd;
      }

      .btn-register {
        width: 100%;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <div class="register-card">
      <div class="logo">🎓 Secure Student System</div>

      <h4 class="title">Crear Cuenta</h4>

      <input id="name" class="form-control mb-3" placeholder="Nombre" />

      <input id="email" class="form-control mb-3" placeholder="Email" />

      <input
        id="password"
        type="password"
        class="form-control mb-3"
        placeholder="Password"
      />

      <select id="role" class="form-control mb-3">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
      </select>

      <button onclick="register()" class="btn btn-success btn-register">
        Registrar
      </button>

      <div class="text-center mt-3">
        <a href="login.html">Volver al Login</a>
      </div>
    </div>

    <script>
      async function register() {
        const response = await fetch(
          "http://localhost:3000/api/auth/register",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              name: name.value,
              email: email.value,
              password: password.value,
              role: role.value,
            }),
          },
        );

        if (response.ok) {
          alert("Usuario creado");
          window.location = "login.html";
        } else {
          alert("Error creando usuario");
        }
      }
    </script>
  </body>
</html>
