<!doctype html>
<html lang="es">
  <head>
    <title>Panel Estudiante</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-white">
    <div class="container mt-4">
      <h2 class="mb-4">Panel Estudiante</h2>

      <button onclick="logout()" class="btn btn-danger mb-4">Logout</button>

      <div class="card bg-secondary">
        <div class="card-body">
          <h4>Mis Notas</h4>

          <table class="table table-dark table-striped">
            <thead>
              <tr>
                <th>Materia</th>
                <th>Nota</th>
              </tr>
            </thead>

            <tbody id="gradesTable"></tbody>
          </table>

          <h5 class="mt-3">Promedio: <span id="average">0</span></h5>
        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>

    <script>
      async function loadGrades() {
        try {
          const res = await fetch(API + "/grades/my", {
            headers: getHeaders(),
          });
          
          if (!res.ok) {
            throw new Error('Error al cargar las notas');
          }
          
          const data = await res.json();
          const gradesTable = document.getElementById('gradesTable');
          const averageSpan = document.getElementById('average');
          
          gradesTable.innerHTML = "";
          let total = 0;
          
          if (data.length === 0) {
            gradesTable.innerHTML = '<tr><td colspan="2" class="text-center">No hay notas registradas</td></tr>';
            averageSpan.innerText = '0';
          } else {
            data.forEach((g) => {
              gradesTable.innerHTML += `
                <tr>
                  <td>${g.subject}</td>
                  <td>${g.grade}</td>
                </tr>
              `;
              total += Number(g.grade);
            });
            
            const promedio = (total / data.length).toFixed(2);
            averageSpan.innerText = promedio;
          }
        } catch (error) {
          console.error('Error loading grades:', error);
          document.getElementById('gradesTable').innerHTML = '<tr><td colspan="2" class="text-center text-danger">Error al cargar las notas</td></tr>';
        }
      }

    loadGrades();
      </script>
  </body>
</html>
