<!doctype html>
<html lang="es">
  <head>
    <title>Panel Estudiante</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-white">
    <div class="container mt-4">
      <h2 class="mb-4">Panel Estudiante</h2>

      <button onclick="logout()" class="btn btn-danger mb-4">Logout</button>

      <div class="card bg-secondary">
        <div class="card-body">
          <h4>Mis Notas</h4>

          <table class="table table-dark table-striped">
            <thead>
              <tr>
                <th>Materia</th>
                <th>Nota</th>
              </tr>
            </thead>

            <tbody id="gradesTable"></tbody>
          </table>

          <h5 class="mt-3">Promedio: <span id="average">0</span></h5>
        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>

    <script>
      async function loadGrades() {
        const res = await fetch(API + "/grades/my", {
          headers: getHeaders(),
        });

        const data = await res.json();

        gradesTable.innerHTML = "";

        let total = 0;

        data.forEach((g) => {
          gradesTable.innerHTML += `
<tr>
<td>${g.subject}</td>
<td>${g.grade}</td>
</tr>
`;

          total += Number(g.grade);
        });

        if (data.length > 0) {
          average.innerText = (total / data.length).toFixed(2);
        }
      }

      loadGrades();
    </script>
  </body>
</html>
